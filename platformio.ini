; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = arduino
; Для безэкранной сборки добавьте в нужный environment:
;   -DPROJECT_NO_SCREEN=1
; Для использования встроенного светодиода платы добавьте:
;   -DPROJECT_USE_BOARD_LED=1
; Для переопределения полярности LED добавьте:
;   -DPROJECT_BOARD_LED_ACTIVE_LOW=1  ; LED светит при LOW
;   -DPROJECT_BOARD_LED_ACTIVE_LOW=0  ; LED светит при HIGH
; Для ограничения яркости LED через PWM добавьте:
;   -DPROJECT_BOARD_LED_BRIGHTNESS=32 ; диапазон 0..255
build_flags = 
	-std=gnu++17
monitor_speed = 460800

build_type = debug
debug_build_flags = -Ofast

monitor_filters = esp32_exception_decoder

upload_port = COM25
monitor_port = COM26

;-O0 -g3 -ggdb
lib_deps = 
	gyverlibs/GTL@^1.3.5
	gyverlibs/Settings@^1.3.13
	gyverlibs/StringUtils@^1.5.3
	gyverlibs/mString@^1.7.3
	gyverlibs/GTimer@^1.1.1
	adafruit/Adafruit SSD1306@^2.5.15
build_unflags = -std=gnu++11

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
debug_tool = esp-builtin
debug_speed = 5000
build_flags =
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DHW_VARIANT_ESP32_C3=1

[env:lolin_s2_mini]
board = lolin_s2_mini
build_flags =
	${env.build_flags}
	-DHW_VARIANT_ESP32_S2_MINI=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DPROJECT_USE_BOARD_LED=1
	-DPROJECT_BOARD_LED_BRIGHTNESS=255 ; диапазон 0..255
	-DPROJECT_BOARD_LED_ACTIVE_LOW=0  ; LED светит при HIGH