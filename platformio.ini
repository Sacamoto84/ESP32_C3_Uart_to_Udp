; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@ ^6.13.0
framework = arduino
build_flags = 
	-std=gnu++17
	-DPROJECT_NETWORK_TX_CHUNK_SIZE=1460
monitor_speed = 460800
build_type = debug
debug_build_flags = -Ofast
monitor_filters = esp32_exception_decoder
monitor_port = COM26
lib_deps = 
	gyverlibs/GTL@^1.3.5
	gyverlibs/Settings@^1.3.13
	gyverlibs/StringUtils@^1.5.3
	gyverlibs/mString@^1.7.3
	gyverlibs/GTimer@^1.1.1
	gyverlibs/GyverDB@^1.0.9
	olikraus/U8g2
	spacehuhn/SimpleCLI@^1.1.4
build_unflags = -std=gnu++11

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
debug_tool = esp-builtin
debug_speed = 5000
board_build.partitions = default.csv
build_flags = 
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DHW_VARIANT_ESP32_C3=1
	-DPROJECT_OTA_HOSTNAME=\"esp32-c3-uart\"
	-DPROJECT_BOOT_SERIAL_DELAY_MS=0

[env:esp32-c3-devkitm-1_ota]
board = esp32-c3-devkitm-1
debug_tool = esp-builtin
debug_speed = 5000
board_build.partitions = default.csv
upload_protocol = espota
upload_port = 192.168.0.223
upload_flags = 
	--port=3232
build_flags = 
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DHW_VARIANT_ESP32_C3=1
	-DPROJECT_OTA_HOSTNAME=\"esp32-c3-uart\"
	-DPROJECT_BOOT_SERIAL_DELAY_MS=0

[env:lolin_s2_mini]
board = lolin_s2_mini
board_build.partitions = default.csv
board_build.arduino.memory_type = dio_qspi
build_flags = 
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	-DHW_VARIANT_ESP32_S2_MINI=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DPROJECT_OTA_HOSTNAME=\"esp32-s2-uart\"

[env:lolin_s2_mini_ota]
board = lolin_s2_mini
board_build.partitions = default.csv
board_build.arduino.memory_type = dio_qspi
upload_protocol = espota
upload_port = 192.168.0.222
upload_flags = 
	--port=3232
build_flags = 
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	-DHW_VARIANT_ESP32_S2_MINI=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DPROJECT_OTA_HOSTNAME=\"esp32-s2-uart\"
	-DPROJECT_BOOT_SERIAL_DELAY_MS=0
